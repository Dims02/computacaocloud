<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Finder</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #f5f5f3;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #fff;
            border: 0.5px solid rgba(0,0,0,0.12);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }

        .header { margin-bottom: 1.5rem; }
        .header .eyebrow {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 4px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111;
            margin: 0;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        input[type="number"] {
            flex: 1;
            padding: 10px 12px;
            border: 0.5px solid rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 14px;
            background: #f9f9f7;
            color: #111;
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="number"]:focus { border-color: rgba(0,0,0,0.45); }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 0.5px solid rgba(0,0,0,0.2);
            background: #fff;
            color: #111;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        button:hover { background: #f5f5f3; }
        button:active { transform: scale(0.98); }

        /* Modified: Displayed by default now */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 1.25rem;
        }

        .stat-card {
            background: #f5f5f3;
            border-radius: 8px;
            padding: 12px 14px;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 0 0 4px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 500;
            color: #111;
            margin: 0;
            font-family: "SFMono-Regular", Consolas, monospace;
        }

        #result {
            display: none;
            background: #f5f5f3;
            border: 0.5px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            font-family: "SFMono-Regular", Consolas, monospace;
            color: #555;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .divider {
            height: 1px;
            background: rgba(0,0,0,0.05);
            margin: 1.5rem 0;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1a1a18; }
            .card { background: #242422; border-color: rgba(255,255,255,0.1); }
            .header .eyebrow { color: #777; }
            .header h1 { color: #f0ede8; }
            input[type="number"] { background: #1a1a18; border-color: rgba(255,255,255,0.15); color: #f0ede8; }
            input[type="number"]:focus { border-color: rgba(255,255,255,0.4); }
            button { background: #242422; border-color: rgba(255,255,255,0.15); color: #f0ede8; }
            button:hover { background: #2e2e2c; }
            .stat-card { background: #1a1a18; }
            .stat-label { color: #777; }
            .stat-value { color: #f0ede8; }
            #result { background: #1a1a18; border-color: rgba(255,255,255,0.08); color: #999; }
            .divider { background: rgba(255,255,255,0.05); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <p class="eyebrow">System Readiness</p>
        <h1>Prime Finder</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <p class="stat-label">Page Load</p>
            <p class="stat-value" id="pageLoadTime">...</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">DOM Ready</p>
            <p class="stat-value" id="domTime">...</p>
        </div>
    </div>

    <div class="input-row">
        <input type="number" id="numberInput" placeholder="Max number (e.g. 100000)">
        <button onclick="getPrimes()">Compute</button>
    </div>

    <div id="statsGridCompute" class="stats-grid" style="display: none;">
        <div class="stat-card">
            <p class="stat-label">Server Compute</p>
            <p class="stat-value" id="serverTime">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Net Overhead</p>
            <p class="stat-value" id="networkTime">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Total Primes</p>
            <p class="stat-value" id="primeCount">—</p>
        </div>
        <div class="stat-card">
            <p class="stat-label">Heap Usage</p>
            <p class="stat-value" id="memHint">—</p>
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
    // 1. Capture initial performance on load
    window.addEventListener('load', () => {
        // Use the PerformanceNavigationTiming API
        const [entry] = performance.getEntriesByType('navigation');

        if (entry) {
            const loadTime = entry.loadEventEnd - entry.startTime;
            const domReady = entry.domContentLoadedEventEnd - entry.startTime;

            document.getElementById('pageLoadTime').innerText = Math.round(loadTime) + 'ms';
            document.getElementById('domTime').innerText = Math.round(domReady) + 'ms';
        }
    });

    async function getPrimes() {
        const n = document.getElementById('numberInput').value;
        const resultDiv = document.getElementById('result');
        const computeGrid = document.getElementById('statsGridCompute');

        if (!n) return alert('Enter a number');

        const clientStart = performance.now();
        resultDiv.style.display = 'block';
        resultDiv.innerText = 'Requesting serverless instance…';

        try {
            // NOTE: This fetch will fail unless you have a real /api/primes endpoint
            const response = await fetch(`/api/primes?n=${n}`);
            const data = await response.json();

            const clientEnd = performance.now();
            const totalRtt = clientEnd - clientStart;
            const serverExec = parseFloat(data.stats.executionTimeMs);
            const networkOverhead = totalRtt - serverExec;

            computeGrid.style.display = 'grid';
            document.getElementById('serverTime').innerText = serverExec.toFixed(2) + 'ms';
            document.getElementById('networkTime').innerText = networkOverhead.toFixed(2) + 'ms';
            document.getElementById('primeCount').innerText = data.count.toLocaleString();
            document.getElementById('memHint').innerText = data.stats.memoryHint;

            resultDiv.innerText = 'Primes: ' + data.primes.slice(0, 100).join(', ') + (data.primes.length > 100 ? '…' : '');

        } catch (err) {
            // Fallback for demo purposes if API doesn't exist
            resultDiv.innerText = 'API not found. Simulate local compute?';
            console.error("Fetch error:", err);
        }
    }
</script>

</body>
</html>
