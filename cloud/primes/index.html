<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Finder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        h1 { margin-bottom: 1rem; font-weight: 700; }
        input {
            width: 80%;
            padding: 12px;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        button {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #333; }
        #result {
            margin-top: 1.5rem;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            word-wrap: break-word;
            font-family: monospace;
            background: #f1f1f1;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Prime Finder</h1>
    <p>Enter a number to find all primes up to it.</p>
    <input type="number" id="numberInput" placeholder="Enter a number (e.g. 100)">
    <br>
    <button onclick="getPrimes()">Find Primes</button>

    <div id="result"></div>
</div>

<script>
    async function getPrimes() {
        const n = document.getElementById('numberInput').value;
        const resultDiv = document.getElementById('result');

        if (!n) return alert("Please enter a number");

        resultDiv.style.display = 'block';
        resultDiv.innerText = "Loading...";

        try {
            // This calls the serverless function we created earlier
            const response = await fetch(`/api/primes?n=${n}`);
            const data = await response.json();

            if (data.primes) {
                resultDiv.innerText = data.primes.join(', ');
            } else {
                resultDiv.innerText = "Error: " + data.error;
            }
        } catch (err) {
            resultDiv.innerText = "Failed to fetch primes.";
        }
    }
</script>

</body>
</html>
